version: '3.8'

services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: serve
    container_name: frontend-app
    ports:
      - "3000:80"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - frontend-net

  # Jenkins local (for pipeline testing)
  jenkins:
    image: jenkins/jenkins:lts-jdk17
    container_name: jenkins-local
    privileged: true
    user: root
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins-home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - JAVA_OPTS=-Djenkins.install.runSetupWizard=false
    networks:
      - frontend-net

volumes:
  jenkins-home:
    driver: local

networks:
  frontend-net:
    driver: bridge
